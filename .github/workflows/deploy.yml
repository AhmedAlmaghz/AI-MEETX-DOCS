name: Deploy

on:
  push:
    branches: [main]

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: []
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Deploy Docker image to registry
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker build -t ${{ secrets.DOCKER_REGISTRY }}/aimeetx-web:latest -f apps/web/Dockerfile .
          docker push ${{ secrets.DOCKER_REGISTRY }}/aimeetx-web:latest

      - name: Run Flyway migrations
        run: |
          echo "Running Flyway migrations against production PostgreSQL..."
          echo "This step requires Flyway CLI and DATABASE_URL secret to be configured."

      - name: Production smoke test
        run: |
          echo "Running production smoke tests..."
          echo "Waiting for deployment to be ready..."

      - name: Create release tag
        run: |
          TAG="v$(date +'%Y%m%d%H%M%S')"
          git tag $TAG
          git push origin $TAG
          echo "Created release tag: $TAG"