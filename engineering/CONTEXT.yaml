# AI MeetX — Engineering Context
# This file is the canonical AI agent bootstrap contract.
# Every AI coding agent MUST read this file first before touching any code.
#
# Document ID: CONTEXT-001
# Version: 2.0.0
# Status: Active

# ─── Reading Protocol ──────────────────────────────────────────────────────────
reading_protocol:
  description: >
    An AI agent MUST read documents in the order defined below before generating
    any code or making any architectural decision.

  step_1_governance:
    - 00-governance/PROJECT_CONSTITUTION.md
    - 00-governance/ADR/ADR-001-GEMINI-LIVE-TRANSLATE.md
    - 00-governance/ADR/ADR-003-REDIS-FIRST-STORAGE.md
    - 00-governance/ADR/ADR-004-CLEAN-ARCHITECTURE-ISOLATION.md
    - 00-governance/ADR/ADR-005-NEXTJS-SDK-FIRST.md
    - note: ADR-002-MODULAR-MONOREPO is SUPERSEDED by ADR-005 (do not use)

  step_2_product:
    - 01_PROJECT_VISION.md
    - 01-product/02_PRODUCT_REQUIREMENTS.md

  step_3_architecture:
    - 02-architecture/04_ARCHITECTURE_RULES.md

  step_4_engineering_guides:
    - 03-engineering/03_EXECUTION_MASTER_PLAN.md
    - 03-engineering/05_CODING_STANDARDS.md
    - 03-engineering/06_TECH_STACK.md
    - 03-engineering/07_REPOSITORY_STRUCTURE.md
    - 03-engineering/08_DATABASE_OVERVIEW.md
    - 03-engineering/09_EVENT_SYSTEM.md
    - 03-engineering/10_AI_GUIDELINES.md
    - 03-engineering/11_TESTING_GUIDE.md
    - 03-engineering/12_DEPLOYMENT_GUIDE.md

  step_5_roadmap:
    - ROADMAP.yaml
    - INDEX.yaml

  step_6_current_phase:
    description: >
      Load the current phase YAML from the phases/ directory.
      Read ONLY the features listed in that phase's 'produces' key.

