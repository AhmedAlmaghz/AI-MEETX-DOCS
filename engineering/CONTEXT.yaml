# ─── Critical Constraints (Non-Negotiable) ────────────────────────────────────
constraints:
  module_isolation:
    rule: Feature modules MUST NOT import from each other directly.
    mechanism: All cross-module communication via domain events only.

  ai_access:
    rule: Only feature-translation and feature-ai may call Gemini APIs.
    model: gemini-3.5-live-translate-preview (for translation)
    session_policy: One WebSocket session per target language per meeting.

  data_privacy:
    rule: Raw audio/video streams and raw transcripts MUST NEVER be persisted.
    stored_only: Processed outputs (summaries, action items, reports, metadata).

  presence_timing:
    heartbeat_interval_seconds: 5
    disconnection_timeout_seconds: 15

  audit_log_immutability:
    rule: admin_audit_log table — RLS policy blocks all UPDATE and DELETE operations.

  clean_architecture:
    layers_in_order: [domain, data, presentation]
    forbidden: Cross-layer direct calls; business logic in UI; shared mutable state across modules.