project:
  name: AI Meeting Platform (AI MeetX)
  current_version: MVP
  description: >
    Enterprise-grade real-time meeting platform with AI-powered live translation,
    virtual classrooms, multi-tenant administration, and analytics.
    Built as a Next.js 16 + TypeScript SDK-First monorepo (per ADR-005).

execution:
  total_phases: 12
  architecture_version: 2.0  # Next.js 16 SDK-First (ADR-005)

  phases:

    - id: PHASE_00
      name: Foundation & SDK Monorepo Setup
      file: phases/phase-0.yaml
      feature: core infrastructure (pnpm + Turborepo + @aimeetx/sdk skeleton + apps/web shell)
      status: planned
      architecture: ADR-005

    - id: PHASE_01
      name: Authentication & Identity
      file: phases/phase-1.yaml
      feature: "@aimeetx/sdk/auth (consumed by apps/web)"
      status: planned

    - id: PHASE_02
      name: Profile & Account Management
      file: phases/phase-2.yaml
      feature: "@aimeetx/sdk/profile"
      status: planned

    - id: PHASE_03
      name: Meeting Platform
      file: phases/phase-3.yaml
      feature: "@aimeetx/sdk/meeting (9 subdomains)"
      status: planned

    - id: PHASE_04
      name: Media Engine
      file: phases/phase-4.yaml
      feature: "@aimeetx/sdk/media (8 subdomains)"
      status: planned

    - id: PHASE_05
      name: Collaboration Platform
      file: phases/phase-5.yaml
      feature: "@aimeetx/sdk/chat"
      status: planned

    - id: PHASE_06
      name: AI Platform
      file: phases/phase-6.yaml
      feature: "@aimeetx/sdk/translation + @aimeetx/sdk/ai-assistant"
      status: planned

    - id: PHASE_07
      name: Education Platform
      file: phases/phase-7.yaml
      feature: "@aimeetx/sdk/classroom"
      status: planned

    - id: PHASE_08
      name: Administration Platform
      file: phases/phase-8.yaml
      feature: "@aimeetx/sdk/admin"
      status: planned

    - id: PHASE_09
      name: Analytics Platform
      file: phases/phase-9.yaml
      feature: "@aimeetx/sdk/analytics"
      status: planned

    - id: PHASE_10
      name: Security, Testing & Quality
      file: phases/phase-10.yaml
      feature: "@aimeetx/sdk/recording + @aimeetx/sdk/notification + security hardening"
      status: planned

    - id: PHASE_11
      name: Production Release
      file: phases/phase-11.yaml
      feature: CI/CD + Vercel deployment + npm publish
      status: planned

rules:
  build_one_phase_only: true
  build_one_module_only: true
  stop_after_phase: true
  require_exit_gates: true
  no_phase_skipping: true
  sdk_is_single_source_of_truth: true  # ADR-005

dependency_graph:
  PHASE_00: []
  PHASE_01: [PHASE_00]
  PHASE_02: [PHASE_00, PHASE_01]
  PHASE_03: [PHASE_00, PHASE_02]
  PHASE_04: [PHASE_00, PHASE_03]
  PHASE_05: [PHASE_00, PHASE_03]
  PHASE_06: [PHASE_00, PHASE_03, PHASE_04]
  PHASE_07: [PHASE_00, PHASE_03, PHASE_04]
  PHASE_08: [PHASE_00, PHASE_02]
  PHASE_09: [PHASE_00, PHASE_03, PHASE_08]
  PHASE_10: [PHASE_00, PHASE_01, PHASE_02, PHASE_03, PHASE_04, PHASE_05, PHASE_06, PHASE_07, PHASE_08, PHASE_09]
  PHASE_11: [PHASE_10]