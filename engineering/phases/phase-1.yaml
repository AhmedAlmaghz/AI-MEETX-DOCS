# phase-1.yaml — Authentication & Identity
name: Authentication & Identity
phase: 1
description: >
  Implement the complete authentication system including email/password login,
  guest access, session management, and secure token handling.
  This phase unlocks the ability to identify users across all subsequent features.

steps:
  - Setup feature-auth module internal directory structure (presentation, domain, data)
  - Create database schema for users and session details
  - Implement Domain models (User, SessionStatus, AuthCredentials)
  - Implement Repository port (AuthRepository)
  - Implement Data Source and DTO mapping (FirebaseAuth / Supabase integration)
  - Implement Use cases:
      - LoginWithEmailUseCase
      - RegisterWithEmailUseCase
      - LoginAsGuestUseCase
      - LogoutUseCase
      - RefreshSessionUseCase
  - Implement Presentation layer:
      - LoginScreen (Jetpack Compose, Material 3)
      - RegisterScreen
      - AuthViewModel with StateFlow state management
  - Write JUnit 5 unit tests for all Use cases
  - Write Hilt integration tests for authentication flows

exit_gates:
  - User can register, login, and logout with email/password
  - Guest session token is issued and stored securely (EncryptedSharedPreferences)
  - Session expiry triggers automatic re-authentication prompt
  - All Use case unit tests pass
  - Hilt integration tests pass

dependencies:
  - phase-0

produces:
  - :feature-auth